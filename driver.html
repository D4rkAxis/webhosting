<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Driver App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #121212; color: #fff; font-family: sans-serif; }
    .app-container { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #1e1e1e; position: relative; }
    
    /* Login Screen */
    .login-box { padding: 2rem; text-align: center; padding-top: 30vh; }
    .form-control { background: #333; border: none; color: white; margin-bottom: 1rem; padding: 15px; }
    .form-control:focus { background: #444; color: white; box-shadow: none; }
    
    /* Dashboard */
    .top-bar { padding: 15px; background: #000; display: flex; justify-content: space-between; align-items: center; }
    .driver-info { font-size: 0.9rem; color: #aaa; }
    .driver-name { font-weight: bold; color: white; font-size: 1.1rem; }
    
    .main-action { padding: 2rem; text-align: center; }
    
    .btn-circle {
      width: 200px; height: 200px; border-radius: 50%; border: 8px solid #333;
      font-size: 2rem; font-weight: bold; text-transform: uppercase;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      margin: 0 auto; transition: 0.2s;
    }
    .btn-start { background: #06d6a0; color: #000; box-shadow: 0 0 20px rgba(6, 214, 160, 0.4); }
    .btn-start:active { transform: scale(0.95); }
    
    .btn-stop { background: #ef476f; color: white; box-shadow: 0 0 20px rgba(239, 71, 111, 0.4); animation: pulse 2s infinite; }
    
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 71, 111, 0.7); }
      70% { box-shadow: 0 0 0 20px rgba(239, 71, 111, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 71, 111, 0); }
    }

    .timer-display { font-size: 3rem; font-family: monospace; margin-top: 20px; font-weight: bold; }
    .status-text { color: #888; margin-bottom: 20px; }
    
    .history-list { padding: 15px; }
    .trip-card { background: #2a2a2a; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #06d6a0; }
    .trip-card.ongoing { border-left: 5px solid #ef476f; }
    
    .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 480px; background: #000; display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #333; }
    .nav-item { color: #666; text-align: center; font-size: 0.8rem; cursor: pointer; }
    .nav-item.active { color: #06d6a0; }
    .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 5px; }
  </style>
</head>
<body>

<div class="app-container">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-box">
      <h2 class="mb-4"><i class="fas fa-car"></i> DRIVER APP</h2>
      <input type="text" id="username" class="form-control" placeholder="Username">
      <input type="password" id="password" class="form-control" placeholder="Password">
      <button onclick="login()" class="btn btn-success w-100 py-3 fw-bold">LOGIN</button>
      <p class="mt-3 text-muted" onclick="showRegister()">New Driver? Register here</p>
      <div id="loginMsg" class="mt-3"></div>
    </div>
  </div>

  <!-- REGISTER SCREEN -->
  <div id="registerScreen" class="d-none">
    <div class="login-box" style="padding-top: 10vh;">
      <h3 class="mb-4">New Driver</h3>
      <input type="text" id="regUsername" class="form-control" placeholder="Username">
      <input type="password" id="regPassword" class="form-control" placeholder="Password">
      <input type="text" id="regFullname" class="form-control" placeholder="Full Name">
      <input type="text" id="regPlate" class="form-control" placeholder="Car Plate Number">
      <input type="text" id="regPhone" class="form-control" placeholder="Phone Number">
      <button onclick="register()" class="btn btn-primary w-100 py-3 fw-bold">REGISTER</button>
      <p class="mt-3 text-muted" onclick="showLogin()">Back to Login</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="appScreen" class="d-none">
    <div class="top-bar">
      <div>
        <div class="driver-name" id="displayDriverName">Driver</div>
        <div class="driver-info" id="displayPlate">ABC-123</div>
      </div>
      <button onclick="logout()" class="btn btn-sm btn-outline-secondary">Logout</button>
    </div>

    <!-- HOME TAB -->
    <div id="tabHome" class="main-action">
      <div class="status-text" id="statusText">Ready to start?</div>
      
      <!-- START BUTTON -->
      <div id="btnStart" class="btn-circle btn-start" onclick="startTrip()">
        <i class="fas fa-play mb-2"></i> START
      </div>

      <!-- STOP BUTTON (Hidden) -->
      <div id="btnStop" class="btn-circle btn-stop d-none" onclick="stopTrip()">
        <i class="fas fa-stop mb-2"></i> STOP
      </div>

      <div class="timer-display" id="timer">00:00:00</div>
      <div class="mt-3 text-muted" id="gpsStatus"><i class="fas fa-satellite"></i> GPS Ready</div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tabHistory" class="d-none">
      <h4 class="p-3 mb-0">My Trips</h4>
      <div class="history-list" id="historyList">
        <!-- Items go here -->
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div class="nav-bottom">
      <div class="nav-item active" onclick="switchTab('home')">
        <i class="fas fa-road"></i> Drive
      </div>
      <div class="nav-item" onclick="switchTab('history')">
        <i class="fas fa-history"></i> History
      </div>
    </div>

  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx-i0Bye9VtcRBN59-IRPEPyEZeS3jehtZ0wovcgZHKtEksaQQ-jIPEx1T900oSni0j/exec";

let currentUser = null;
let currentTrip = null;
let timerInterval = null;

// ================= AUTH =================
function showRegister() { document.getElementById('loginScreen').classList.add('d-none'); document.getElementById('registerScreen').classList.remove('d-none'); }
function showLogin() { document.getElementById('registerScreen').classList.add('d-none'); document.getElementById('loginScreen').classList.remove('d-none'); }

async function login() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  document.getElementById('loginMsg').innerHTML = "Logging in...";
  
  try {
    // Use POST for login to avoid caching and ensure consistent headers
    const res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "login", username: u, password: p }),
      headers: { "Content-Type": "text/plain;charset=utf-8" }
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    
    currentUser = data;
    localStorage.setItem("driverUser", JSON.stringify(currentUser));
    initApp();
  } catch(e) {
    document.getElementById('loginMsg').innerHTML = `<span class="text-danger">${e.message}</span>`;
  }
}

async function register() {
  const body = {
    action: "register",
    username: document.getElementById('regUsername').value.trim(),
    password: document.getElementById('regPassword').value.trim(),
    fullName: document.getElementById('regFullname').value.trim(),
    carPlate: document.getElementById('regPlate').value.trim(),
    phone: document.getElementById('regPhone').value.trim()
  };
  
  try {
    const res = await fetch(API_URL, { 
      method: "POST", 
      headers: { "Content-Type": "text/plain;charset=utf-8" }, // Fixes CORS Preflight
      body: JSON.stringify(body) 
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    alert("Registered! Please login.");
    showLogin();
  } catch(e) {
    alert(e.message);
  }
}

function logout() {
  localStorage.removeItem("driverUser");
  location.reload();
}

// ================= APP LOGIC =================
function initApp() {
  document.getElementById('loginScreen').classList.add('d-none');
  document.getElementById('appScreen').classList.remove('d-none');
  document.getElementById('displayDriverName').innerText = currentUser.fullName;
  document.getElementById('displayPlate').innerText = currentUser.carPlate;
  
  // Check if trip is active
  const savedTrip = localStorage.getItem("activeTrip");
  if (savedTrip) {
    currentTrip = JSON.parse(savedTrip);
    showStopButton();
    startTimer();
  }
}

function startTrip() {
  if (!navigator.geolocation) return alert("GPS not supported");
  document.getElementById('gpsStatus').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Getting GPS...';
  
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const gps = `${pos.coords.latitude},${pos.coords.longitude}`;
    
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "startTrip",
          driverId: currentUser.driverId,
          driverName: currentUser.fullName,
          gps: gps
        }),
        headers: { "Content-Type": "text/plain;charset=utf-8" }
      });
      const data = await res.json();
      
      currentTrip = { tripId: data.tripId, startTime: new Date().getTime() };
      localStorage.setItem("activeTrip", JSON.stringify(currentTrip));
      
      showStopButton();
      startTimer();
      document.getElementById('gpsStatus').innerHTML = '<i class="fas fa-check"></i> Trip Started';
    } catch(e) {
      alert("Error starting trip: " + e.message);
    }
  });
}

function stopTrip() {
  if (!navigator.geolocation) return alert("GPS not supported");
  document.getElementById('gpsStatus').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ending Trip...';
  
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const gps = `${pos.coords.latitude},${pos.coords.longitude}`;
    
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "stopTrip",
          tripId: currentTrip.tripId,
          gps: gps
        }),
        headers: { "Content-Type": "text/plain;charset=utf-8" }
      });
      const data = await res.json();
      
      alert(`Trip Ended!\nDistance: ${data.distance} km`);
      
      localStorage.removeItem("activeTrip");
      currentTrip = null;
      clearInterval(timerInterval);
      document.getElementById('timer').innerText = "00:00:00";
      
      showStartButton();
      document.getElementById('gpsStatus').innerHTML = '<i class="fas fa-satellite"></i> GPS Ready';
    } catch(e) {
      alert("Error stopping trip: " + e.message);
    }
  });
}

function showStopButton() {
  document.getElementById('btnStart').classList.add('d-none');
  document.getElementById('btnStop').classList.remove('d-none');
  document.getElementById('statusText').innerText = "Trip in Progress...";
}

function showStartButton() {
  document.getElementById('btnStart').classList.remove('d-none');
  document.getElementById('btnStop').classList.add('d-none');
  document.getElementById('statusText').innerText = "Ready to start?";
}

function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!currentTrip) return;
    const diff = new Date().getTime() - currentTrip.startTime;
    const date = new Date(diff);
    const hh = ('0' + date.getUTCHours()).slice(-2);
    const mm = ('0' + date.getUTCMinutes()).slice(-2);
    const ss = ('0' + date.getUTCSeconds()).slice(-2);
    document.getElementById('timer').innerText = `${hh}:${mm}:${ss}`;
  }, 1000);
}

async function loadHistory() {
  document.getElementById('historyList').innerHTML = "Loading...";
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "getHistory", driverId: currentUser.driverId }),
    headers: { "Content-Type": "text/plain;charset=utf-8" }
  });
  const trips = await res.json();
  
  let html = "";
  trips.forEach(t => {
    // t: TripID, DriverID, Name, Start, StartGPS, Stop, StopGPS, Duration, Dist, Status
    const dist = t[8] || 0;
    const status = t[9];
    html += `
      <div class="trip-card ${status === 'ONGOING' ? 'ongoing' : ''}">
        <div class="d-flex justify-content-between">
          <strong>${t[3].split(' ')[0]}</strong>
          <span>${dist} km</span>
        </div>
        <div class="small text-muted">${t[3].split(' ')[1]} - ${t[5] ? t[5].split(' ')[1] : '...'}</div>
        <div class="small mt-1 text-uppercase">${status}</div>
      </div>
    `;
  });
  document.getElementById('historyList').innerHTML = html || "No trips yet.";
}

function switchTab(tab) {
  if (tab === 'home') {
    document.getElementById('tabHome').classList.remove('d-none');
    document.getElementById('tabHistory').classList.add('d-none');
  } else {
    document.getElementById('tabHome').classList.add('d-none');
    document.getElementById('tabHistory').classList.remove('d-none');
    loadHistory();
  }
}

// ================= INIT =================
window.onload = () => {
  const saved = localStorage.getItem("driverUser");
  if (saved) {
    currentUser = JSON.parse(saved);
    initApp();
  }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
